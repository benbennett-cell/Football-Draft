<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Draft</title>
<style>
  :root {
    --pitch-green: #2d5a27;
    --dark-bg: #1a1a2e;
    --card-bg: #16213e;
    --border: rgba(255,255,255,0.1);
    --text: #e2e8f0;
    --muted: #94a3b8;
    --gk-color: #f59e0b;
    --def-color: #3b82f6;
    --mid-color: #10b981;
    --att-color: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--dark-bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* ---- SCREENS ---- */
  .screen { display: none; padding: 20px; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ---- HOME ---- */
  #home-screen { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); justify-content: center; gap: 20px; }
  .logo { font-size: 2.8rem; font-weight: 900; text-align: center; background: linear-gradient(135deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-sub { color: var(--muted); text-align: center; font-size: 0.9rem; margin-bottom: 8px; }
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 420px; }
  .card h2 { margin-bottom: 18px; font-size: 1.1rem; }
  .field-group { margin-bottom: 14px; }
  label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 5px; }
  input, select { width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus { border-color: #10b981; }
  select option { background: #1a1a2e; }
  .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; }
  .btn-green { background: linear-gradient(135deg, #10b981, #059669); color: white; }
  .btn-green:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(16,185,129,0.4); }
  .btn-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; margin-top: 8px; }
  .btn-blue:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(59,130,246,0.4); }
  .btn-red { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
  .divider { text-align: center; color: var(--muted); font-size: 0.82rem; margin: 10px 0; }

  /* ---- LOBBY ---- */
  #lobby-screen { gap: 18px; padding-top: 36px; }
  .room-code-box { background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(59,130,246,0.15)); border: 2px solid #10b981; border-radius: 16px; padding: 18px 24px; text-align: center; width: 100%; max-width: 420px; }
  .room-code-box .rlabel { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  .room-code-box .rcode { font-size: 2.4rem; font-weight: 900; letter-spacing: 8px; color: #10b981; }
  .player-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; background: rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 7px; border: 1px solid var(--border); }
  .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.88rem; flex-shrink: 0; }
  .host-badge { font-size: 0.68rem; background: #f59e0b; color: #111; padding: 2px 8px; border-radius: 20px; font-weight: 700; margin-left: auto; }
  .lobby-status { color: var(--muted); font-size: 0.88rem; text-align: center; }

  /* ---- DRAFT ---- */
  #draft-screen { padding: 0; gap: 0; align-items: stretch; }
  .draft-header { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 10px 14px; position: sticky; top: 0; z-index: 100; }
  .turn-banner { text-align: center; padding: 8px 14px; border-radius: 10px; font-weight: 700; font-size: 0.95rem; margin-bottom: 8px; }
  .turn-your { background: linear-gradient(135deg, #10b981, #059669); color: white; animation: pulse-b 2s infinite; }
  .turn-wait { background: rgba(255,255,255,0.07); color: var(--muted); }
  @keyframes pulse-b { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.4)} 50%{box-shadow:0 0 0 8px rgba(16,185,129,0)} }
  .squad-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .squad-tabs::-webkit-scrollbar { display: none; }
  .s-tab { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.2s; flex-shrink: 0; }
  .s-tab.active { background: #10b981; border-color: #10b981; color: white; }
  .draft-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }
  .pitch-area { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .formation-row { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 340px; }
  .formation-row label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
  .formation-row select { flex: 1; padding: 7px 10px; font-size: 0.83rem; }
  .pitch-wrapper { width: 100%; max-width: 340px; }
  .pitch-container { width: 100%; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }

  /* ---- SIDE PANEL ---- */
  .side-panel { width: 210px; background: var(--card-bg); border-left: 1px solid var(--border); overflow-y: auto; padding: 14px; flex-shrink: 0; }
  .side-panel h3 { font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .nation-chip { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.35); border-radius: 20px; font-size: 0.72rem; color: #fca5a5; margin: 2px; }
  .pick-item { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.78rem; }
  .pick-item .pk-name { font-weight: 600; }
  .pick-item .pk-meta { color: var(--muted); font-size: 0.72rem; }
  .side-toggle { display: none; position: fixed; bottom: 70px; right: 14px; z-index: 200; width: 44px; height: 44px; border-radius: 50%; background: #10b981; color: white; border: none; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.4); align-items: center; justify-content: center; }

  /* ---- PICK MODAL ---- */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 1000; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: var(--card-bg); border-radius: 20px 20px 0 0; padding: 24px 22px 30px; width: 100%; max-width: 480px; animation: slideup 0.28s ease; }
  @keyframes slideup { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width: 38px; height: 4px; background: rgba(255,255,255,0.18); border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
  .pos-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .nat-option { padding: 9px 14px; cursor: pointer; font-size: 0.88rem; color: var(--text); }
  .nat-option:hover, .nat-option.focused { background: rgba(16,185,129,0.18); }
  .nat-option.locked { color: #64748b; cursor: not-allowed; }
  .nat-selected { border-color: #10b981 !important; }
  .modal-actions .btn { flex: 1; }

  /* ---- RESULTS ---- */
  #results-screen { gap: 18px; padding-top: 26px; }
  .results-hdr { text-align: center; }
  .results-hdr h2 { font-size: 1.7rem; font-weight: 900; color: #10b981; }
  .results-hdr p { color: var(--muted); margin-top: 3px; }
  .result-tabs { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .result-pitch { width: 100%; max-width: 340px; }

  /* ---- TOAST ---- */
  .toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%) translateY(-90px); background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 11px 18px; z-index: 9999; font-size: 0.88rem; transition: transform 0.28s; max-width: 300px; text-align: center; box-shadow: 0 6px 24px rgba(0,0,0,0.4); pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.err { border-color: #ef4444; color: #fca5a5; }
  .toast.ok { border-color: #10b981; color: #6ee7b7; }

  @media (max-width: 600px) {
    .side-panel { display: none; }
    .side-panel.mob-open { display: block; position: fixed; right: 0; top: 0; bottom: 0; z-index: 500; width: 250px; box-shadow: -4px 0 20px rgba(0,0,0,0.5); }
    .side-toggle { display: flex; }
  }
</style>
</head>

<div class="toast" id="toast"></div>

<!-- HOME -->
<div class="screen active" id="home-screen">
  <div class="logo">⚽ FootballXI</div>
  <div class="logo-sub">Build your ultimate squad together</div>
  <div class="card">
    <h2>Your Name</h2>
    <div class="field-group">
      <input type="text" id="inp-name" placeholder="Display name" maxlength="20" />
    </div>
    <button class="btn btn-green" onclick="createRoom()">Create Room</button>
    <div class="divider">— or join —</div>
    <div class="field-group">
      <label>Room Code</label>
      <input type="text" id="inp-code" placeholder="ABC123" maxlength="6" style="text-transform:uppercase;letter-spacing:5px;text-align:center;" oninput="this.value=this.value.toUpperCase()" />
    </div>
    <button class="btn btn-blue" onclick="joinRoom()">Join Room</button>
  </div>
</div>

<!-- LOBBY -->
<div class="screen" id="lobby-screen">
  <div class="room-code-box">
    <div class="rlabel">ROOM CODE — SHARE WITH FRIENDS</div>
    <div class="rcode" id="lobby-code">------</div>
  </div>
  <div class="card" style="max-width:420px;">
    <h2>Players</h2>
    <div id="players-list"></div>
    <div class="lobby-status" id="lobby-status" style="margin-top:10px;"></div>
    <button class="btn btn-green" id="start-btn" style="margin-top:14px;display:none;" onclick="startDraft()">Start Draft</button>
  </div>
</div>

<!-- DRAFT -->
<div class="screen" id="draft-screen">
  <div class="draft-header">
    <div class="turn-banner turn-wait" id="turn-banner">Loading...</div>
    <div class="squad-tabs" id="squad-tabs"></div>
  </div>
  <div class="draft-body">
    <div class="pitch-area">
      <div class="formation-row">
        <label>Formation:</label>
        <select id="formation-sel" onchange="changeFormation(this.value)" disabled>
          <option value="4-4-2">4-4-2</option>
          <option value="4-3-3">4-3-3</option>
          <option value="4-2-3-1">4-2-3-1</option>
          <option value="3-5-2">3-5-2</option>
          <option value="5-3-2">5-3-2</option>
          <option value="3-4-3">3-4-3</option>
          <option value="4-5-1">4-5-1</option>
          <option value="4-1-4-1">4-1-4-1</option>
        </select>
      </div>
      <div class="pitch-wrapper">
        <div class="pitch-container" id="pitch-container"></div>
      </div>
    </div>
    <div class="side-panel" id="side-panel">
      <h3>Locked Nations</h3>
      <div id="locked-list"></div>
      <h3 style="margin-top:14px;">Recent Picks</h3>
      <div id="picks-feed"></div>
    </div>
  </div>
  <button class="side-toggle" id="side-toggle" onclick="togglePanel()">📋</button>
</div>

<!-- RESULTS -->
<div class="screen" id="results-screen">
  <div class="results-hdr">
    <h2>Draft Complete!</h2>
    <p>All squads finalised</p>
  </div>
  <div class="result-tabs" id="result-tabs"></div>
  <div class="result-pitch" id="result-pitch"></div>
  <button class="btn btn-blue" style="max-width:280px;margin-top:14px;" onclick="goHome()">Back to Home</button>
</div>

<!-- PICK MODAL -->
<div class="modal-overlay" id="pick-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Pick a Player</div>
    <span class="pos-badge" id="modal-badge">GK</span>
    <div class="field-group">
      <label>Player Name</label>
      <input type="text" id="modal-name" placeholder="e.g. Mohamed Salah" maxlength="40" />
    </div>
    <div class="field-group" style="position:relative">
      <label>Nationality</label>
      <input type="text" id="modal-nat-input" placeholder="Type to search…" autocomplete="off" oninput="filterNations();$id('modal-nat').value='';this.classList.remove('nat-selected')" onfocus="filterNations()" />
      <div id="nation-dropdown" style="display:none;position:absolute;left:0;right:0;top:100%;background:#1e2d3d;border:1px solid rgba(255,255,255,0.15);border-radius:0 0 10px 10px;max-height:180px;overflow-y:auto;z-index:2000;"></div>
      <input type="hidden" id="modal-nat" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-red" onclick="closeModal()">Cancel</button>
      <button class="btn btn-green" onclick="confirmPick()">Confirm Pick</button>
    </div>
  </div>
</div>

    {id:"cm3", pos:"CM",  t:"mid", x:69,y:52},{id:"lm",  pos:"LM",  t:"mid",x:86,y:52},
    {id:"st",  pos:"ST",  t:"att", x:50,y:17}
  ],
  "4-1-4-1": [
    {id:"gk",  pos:"GK",  t:"gk",  x:50,y:88},{id:"rb",  pos:"RB",  t:"def",x:20,y:76},
    {id:"cb1", pos:"CB",  t:"def", x:38,y:76},{id:"cb2", pos:"CB",  t:"def",x:62,y:76},
    {id:"lb",  pos:"LB",  t:"def", x:80,y:76},{id:"cdm", pos:"CDM", t:"mid",x:50,y:62},
    {id:"rm",  pos:"RM",  t:"mid", x:14,y:48},{id:"cm1", pos:"CM",  t:"mid",x:34,y:48},
    {id:"cm2", pos:"CM",  t:"mid", x:66,y:48},{id:"lm",  pos:"LM",  t:"mid",x:86,y:48},
    {id:"st",  pos:"ST",  t:"att", x:50,y:17}
  ]
};

const POS_COLOR = { gk:"#f59e0b", def:"#3b82f6", mid:"#10b981", att:"#ef4444" };
const PLAYER_COLORS = ["#e94560","#3b82f6","#f59e0b","#10b981","#8b5cf6","#ec4899","#06b6d4","#84cc16","#f97316","#a855f7"];

// ===== STATE =====
let myId = null, myName = null, roomCode = null, isHost = false;
let roomRef = null, roomData = null;
let viewId = null; // which player's pitch to view
let pendingSlotId = null, pendingSlotPos = null, pendingSlotType = null;
let panelOpen = false;
let moveSourceSlot = null; // slot id of player being moved

// ===== UTIL =====
function $id(id) { return document.getElementById(id); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $id(id).classList.add('active'); }
let toastTimer;
function toast(msg, type='') {
  clearTimeout(toastTimer);
  const el = $id('toast');
  el.textContent = msg; el.className = 'toast show' + (type?' '+type:'');
  toastTimer = setTimeout(() => el.className='toast', 3000);
}
function genCode() { return Math.random().toString(36).substring(2,8).toUpperCase(); }
function sortedPlayers() { return Object.entries((roomData.players)||{}).sort((a,b)=>a[1].joinedAt-b[1].joinedAt); }

// ===== SNAKE ORDER =====
function buildOrder(playerIds, totalPicks) {
  const n = playerIds.length, order = [];
  let round = 0;
  while (order.length < totalPicks) {
    const slice = round%2===0 ? playerIds : [...playerIds].reverse();
    for (const id of slice) { if (order.length < totalPicks) order.push(id); }
    round++;
  }
  return order;
}

// ===== HOME =====

async function createRoom() {
  const name = $id('inp-name').value.trim();
  if (!name) { toast('Enter your name','err'); return; }
  myName = name; myId = 'p_'+Date.now(); isHost = true;
  roomCode = genCode();
  const snap = await db.ref('rooms/'+roomCode).once('value');
  if (snap.exists()) roomCode = genCode();
  await db.ref('rooms/'+roomCode).set({
    host: myId, status: 'lobby', createdAt: Date.now(),
    players: { [myId]: { name, joinedAt: Date.now(), color: PLAYER_COLORS[0] } },
    lockedNations: {}, picksLog: {},
    squads: { [myId]: { formation: '4-3-3', slots: {} } }
  });
  $id('lobby-code').textContent = roomCode;
  listenRoom(); showScreen('lobby-screen');
}

async function joinRoom() {
  const name = $id('inp-name').value.trim();
  const code = $id('inp-code').value.trim().toUpperCase();
  if (!name) { toast('Enter your name','err'); return; }
  if (code.length !== 6) { toast('Enter 6-character room code','err'); return; }
  const snap = await db.ref('rooms/'+code).once('value');
  if (!snap.exists()) { toast('Room not found','err'); return; }
  const data = snap.val();
  if (data.status !== 'lobby') { toast('Draft already started','err'); return; }
  myName = name; myId = 'p_'+Date.now(); isHost = false; roomCode = code;
  const count = Object.keys(data.players||{}).length;
  await db.ref('rooms/'+code+'/players/'+myId).set({ name, joinedAt: Date.now(), color: PLAYER_COLORS[count%PLAYER_COLORS.length] });
  await db.ref('rooms/'+code+'/squads/'+myId).set({ formation: '4-3-3', slots: {} });
  $id('lobby-code').textContent = code;
  listenRoom(); showScreen('lobby-screen');
}

// ===== LISTEN =====
function listenRoom() {
  roomRef = db.ref('rooms/'+roomCode);
  roomRef.on('value', snap => {
    roomData = snap.val();
    if (!roomData) return;
    if (roomData.status === 'lobby') { renderLobby(); showScreen('lobby-screen'); }
    else if (roomData.status === 'draft') { showScreen('draft-screen'); renderDraft(); }
    else if (roomData.status === 'complete') { showScreen('results-screen'); renderResults(); }
  });
}

// ===== LOBBY =====
function renderLobby() {
  const players = sortedPlayers();
  $id('players-list').innerHTML = players.map(([id,p])=>`
    <div class="player-row">
      <div class="avatar" style="background:${p.color}22;color:${p.color}">${p.name.charAt(0).toUpperCase()}</div>
      <span>${p.name}</span>
      ${id===roomData.host?'<span class="host-badge">HOST</span>':''}
    </div>`).join('');
  $id('lobby-status').textContent = players.length < 2 ? 'Waiting for more players...' : `${players.length} players ready`;
  const startBtn = $id('start-btn');
  startBtn.style.display = myId === roomData.host ? 'block' : 'none';
  startBtn.disabled = players.length < 2;
}

async function startDraft() {
  const ids = sortedPlayers().map(([id])=>id);
  const draftOrder = buildOrder(ids, ids.length * 11);
  await db.ref('rooms/'+roomCode).update({ status:'draft', draftOrder, currentPickIndex: 0 });
}

// ===== DRAFT =====
function renderDraft() {
  if (!viewId) viewId = myId;
  updateTurnBanner();
  buildTabs();
  renderPitch(viewId);
  updateFormationSel();
  updateSidePanel();
}

function updateTurnBanner() {
  const banner = $id('turn-banner');
  const idx = roomData.currentPickIndex || 0;
  const order = roomData.draftOrder || [];
  if (idx >= order.length) {
    banner.textContent = 'Draft Complete!'; banner.className='turn-banner turn-wait'; return;
  }
  const curPicker = order[idx];
  if (curPicker === myId) {
    banner.textContent = '🟢 YOUR TURN — tap a slot to pick';
    banner.className = 'turn-banner turn-your';
  } else {
    banner.textContent = `Waiting for ${(roomData.players[curPicker]||{}).name||'?'}...`;
    banner.className = 'turn-banner turn-wait';
  }
}

function buildTabs() {
  $id('squad-tabs').innerHTML = sortedPlayers().map(([id,p])=>`
    <button class="s-tab${id===viewId?' active':''}" onclick="switchView('${id}')">
      ${p.name}${id===myId?' ★':''}
    </button>`).join('');
}

function switchView(pid) {
  viewId = pid;
  buildTabs();
  renderPitch(pid);
  updateFormationSel();
}

function updateFormationSel() {
  const sel = $id('formation-sel');
  const sq = (roomData.squads||{})[viewId] || {};
  sel.value = sq.formation || '4-3-3';
  sel.disabled = viewId !== myId;
}

function isMyTurn() {
  const idx = roomData.currentPickIndex || 0;
  const order = roomData.draftOrder || [];
  return idx < order.length && order[idx] === myId;
}

function renderPitch(pid) {
  const sq = (roomData.squads||{})[pid] || { formation:'4-3-3', slots:{} };
  const formation = sq.formation || '4-3-3';
  const slotDefs = FORMATIONS[formation] || FORMATIONS['4-3-3'];
  const filledSlots = sq.slots || {};
  const isMe = pid === myId;
  const canDraft = isMe && isMyTurn();
  $id('pitch-container').innerHTML = makePitchSVG(slotDefs, filledSlots, canDraft, moveSourceSlot);
  // Attach click listeners
  slotDefs.forEach(sd => {
    const g = document.querySelector(`#slot-${sd.id}`);
    if (!g) return;
    if (moveSourceSlot) {
      // Move mode: clicking an empty slot moves the player there
      if (!filledSlots[sd.id] && isMe) {
        g.addEventListener('click', () => movePlayerTo(sd.id));
      } else if (sd.id === moveSourceSlot) {
        // clicking the selected slot again cancels move mode
        g.addEventListener('click', () => { moveSourceSlot = null; renderPitch(pid); });
      }
    } else {
      if (!filledSlots[sd.id] && canDraft) {
        g.addEventListener('click', () => openModal(sd.id, sd.pos, sd.t));
      } else if (filledSlots[sd.id] && isMe) {
        // clicking a filled slot on your own pitch enters move mode
        g.addEventListener('click', () => { moveSourceSlot = sd.id; renderPitch(pid); });
      }
    }
  });
}

async function movePlayerTo(targetSlotId) {
  if (!moveSourceSlot || !targetSlotId) return;
  const sq = (roomData.squads||{})[myId] || {};
  const slots = sq.slots || {};
  const playerData = slots[moveSourceSlot];
  if (!playerData) { moveSourceSlot = null; return; }
  const updates = {};
  updates[`rooms/${roomCode}/squads/${myId}/slots/${targetSlotId}`] = { ...playerData };
  updates[`rooms/${roomCode}/squads/${myId}/slots/${moveSourceSlot}`] = null;
  moveSourceSlot = null;
  await db.ref().update(updates);
  toast('Player moved!', 'ok');
}

function makePitchSVG(slotDefs, filledSlots, canClick, selectedSlot) {
  const W=320, H=480, R=19;
  const stripes = Array.from({length:8},(_,i)=>`<rect x="0" y="${i*60}" width="${W}" height="60" fill="${i%2===0?'#2d5a27':'#275121'}" opacity="0.8"/>`).join('');
  const pitch = `
    ${stripes}
    <rect x="8" y="8" width="${W-16}" height="${H-16}" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>
    <line x1="8" y1="${H/2}" x2="${W-8}" y2="${H/2}" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <circle cx="${W/2}" cy="${H/2}" r="42" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <circle cx="${W/2}" cy="${H/2}" r="3" fill="rgba(255,255,255,0.6)"/>
    <rect x="${W/2-62}" y="8" width="124" height="72" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <rect x="${W/2-34}" y="8" width="68" height="34" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <circle cx="${W/2}" cy="54" r="3" fill="rgba(255,255,255,0.6)"/>
    <rect x="${W/2-62}" y="${H-80}" width="124" height="72" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <rect x="${W/2-34}" y="${H-42}" width="68" height="34" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <circle cx="${W/2}" cy="${H-68}" r="3" fill="rgba(255,255,255,0.6)"/>
    <rect x="${W/2-20}" y="${H-8}" width="40" height="8" rx="2" fill="rgba(255,255,255,0.25)"/>
    <rect x="${W/2-20}" y="0" width="40" height="8" rx="2" fill="rgba(255,255,255,0.25)"/>
  `;

  const circles = slotDefs.map(sd => {
    const cx = ((100-sd.x)/100)*W, cy = (sd.y/100)*H;
    const color = POS_COLOR[sd.t] || '#fff';
    const filled = filledSlots[sd.id];
    const clickable = canClick && !filled;
    if (filled) {
      const short = filled.player.length > 9 ? filled.player.substring(0,9)+'…' : filled.player;
      const isSelected = selectedSlot === sd.id;
      const isMovable = !selectedSlot; // on own pitch, all filled slots are clickable to select
      const ringColor = isSelected ? '#f59e0b' : 'white';
      const ringWidth = isSelected ? 3 : 1.5;
      const ringOpacity = isSelected ? 1 : 0.4;
      const pulse = isSelected ? `<animate attributeName="r" values="${R};${R+3};${R}" dur="1s" repeatCount="indefinite"/>` : '';
      return `<g id="slot-${sd.id}" class="slot-group" style="cursor:pointer">
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="${color}" opacity="${isSelected?1:0.92}"/>
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${ringColor}" stroke-width="${ringWidth}" opacity="${ringOpacity}">${pulse}</circle>
        <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="7.5" font-weight="700" font-family="system-ui">${short}</text>
        <text x="${cx}" y="${cy+R+10}" text-anchor="middle" fill="${isSelected?'#f59e0b':color}" font-size="8" font-weight="600" font-family="system-ui">${isSelected?'↕ move':sd.pos}</text>
      </g>`;
    } else {
      const isDropTarget = !!selectedSlot;
      const dashAnim = (clickable||isDropTarget) ? `<animate attributeName="stroke-dashoffset" from="0" to="20" dur="1s" repeatCount="indefinite"/>` : '';
      const glowAnim = (clickable||isDropTarget) ? `<animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>` : '';
      const slotColor = isDropTarget ? '#f59e0b' : color;
      const label = isDropTarget ? '↙ here' : sd.pos;
      return `<g id="slot-${sd.id}" class="slot-group${(clickable||isDropTarget)?' clickable':''}" style="cursor:${(clickable||isDropTarget)?'pointer':'default'}">
        <circle cx="${cx}" cy="${cy}" r="${R}" fill="${slotColor}18" stroke="${slotColor}" stroke-width="${(clickable||isDropTarget)?2.5:1.5}" stroke-dasharray="6 3">
          ${dashAnim}
        </circle>
        <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" fill="${slotColor}" font-size="9.5" font-weight="700" font-family="system-ui">${label}
          ${glowAnim}
        </text>
        ${clickable ? `<text x="${cx}" y="${cy+R+10}" text-anchor="middle" fill="${color}99" font-size="7.5" font-family="system-ui">tap</text>` : ''}
      </g>`;
    }
  }).join('');

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">${pitch}${circles}</svg>`;
}

// ===== MODAL =====
function openModal(slotId, pos, posType) {
  if (!isMyTurn()) return;
  pendingSlotId = slotId; pendingSlotPos = pos; pendingSlotType = posType;
  const badge = $id('modal-badge');
  const col = POS_COLOR[posType]||'#fff';
  badge.textContent = pos; badge.style.background=col+'25'; badge.style.color=col; badge.style.border=`1px solid ${col}55`;
  $id('modal-name').value = '';
  const locked = Object.keys(roomData.lockedNations||{});
  $id('modal-nat-input').value = '';
  $id('modal-nat').value = '';
  $id('nation-dropdown').style.display = 'none';
  filterNations();
  const first = COUNTRIES.find(c=>!locked.includes(c));
  if (first) $id('modal-nat').value = first;
  $id('pick-modal').classList.add('open');
  setTimeout(()=>$id('modal-name').focus(), 280);
}

function filterNations() {
  const query = $id('modal-nat-input').value.trim().toLowerCase();
  const locked = Object.keys((roomData.lockedNations)||{});
  const dd = $id('nation-dropdown');
  const matches = COUNTRIES.filter(c => c.toLowerCase().includes(query));
  if (!query && matches.length === COUNTRIES.length) { dd.style.display='none'; return; }
  dd.innerHTML = matches.map(c => {
    const isLocked = locked.includes(c);
    return `<div class="nat-option${isLocked?' locked':''}" onclick="${isLocked?'':'selectNation(\''+c+'\')'}">${c}${isLocked?' 🔒':''}</div>`;
  }).join('') || '<div class="nat-option locked">No matches</div>';
  dd.style.display = 'block';
}

function selectNation(country) {
  $id('modal-nat-input').value = country;
  $id('modal-nat').value = country;
  $id('nation-dropdown').style.display = 'none';
  $id('modal-nat-input').classList.add('nat-selected');
}

function closeModal() {
  $id('pick-modal').classList.remove('open');
  $id('nation-dropdown').style.display = 'none';
  pendingSlotId = pendingSlotPos = pendingSlotType = null;
}

async function confirmPick() {
  const playerName = $id('modal-name').value.trim();
  const nationality = $id('modal-nat').value;
  if (!playerName) { toast('Enter player name','err'); return; }
  if (!nationality) { toast('Select a nationality from the list','err'); return; }
  if (!isMyTurn()) { toast('Not your turn!','err'); return; }
  // Re-check nation lock
  const lockSnap = await db.ref('rooms/'+roomCode+'/lockedNations/'+nationality).once('value');
  if (lockSnap.exists()) { toast(nationality+' is locked!','err'); return; }
  // Re-check slot empty
  const slotSnap = await db.ref(`rooms/${roomCode}/squads/${myId}/slots/${pendingSlotId}`).once('value');
  if (slotSnap.exists()) { toast('Slot already taken!','err'); closeModal(); return; }

  const newIdx = (roomData.currentPickIndex||0) + 1;
  const total = (roomData.draftOrder||[]).length;
  const updates = {};
  updates[`rooms/${roomCode}/squads/${myId}/slots/${pendingSlotId}`] = { player:playerName, nationality, pos:pendingSlotPos };
  updates[`rooms/${roomCode}/lockedNations/${nationality}`] = myId;
  updates[`rooms/${roomCode}/currentPickIndex`] = newIdx;
  updates[`rooms/${roomCode}/picksLog/${Date.now()}_${myId}`] = { at:Date.now(), player:playerName, nationality, pos:pendingSlotPos, pickerName:myName };
  if (newIdx >= total) updates[`rooms/${roomCode}/status`] = 'complete';
  await db.ref().update(updates);
  closeModal();
}

// ===== FORMATION CHANGE =====
async function changeFormation(newFmt) {
  if (viewId !== myId) return;
  const sq = (roomData.squads||{})[myId] || {};
  const oldSlots = sq.slots || {};
  const newDefs = FORMATIONS[newFmt] || FORMATIONS['4-3-3'];
  // Preserve players: exact pos match first, then posType match
  const players = Object.values(oldSlots);
  const newSlots = {};
  const used = new Set();
  // Pass 1: exact pos match
  players.forEach(p => {
    const match = newDefs.find(nd => nd.pos === p.pos && !used.has(nd.id));
    if (match) { newSlots[match.id] = p; used.add(match.id); }
  });
  // Pass 2: posType match for remaining
  players.forEach(p => {
    if (Object.values(newSlots).includes(p)) return;
    const oldDef = Object.values(FORMATIONS[sq.formation||'4-3-3']||{}).find ?
      (FORMATIONS[sq.formation||'4-3-3']||[]).find(d => d.pos === p.pos) : null;
    const oldType = oldDef ? oldDef.t : null;
    const match = newDefs.find(nd => nd.t === oldType && !used.has(nd.id));
    if (match) { newSlots[match.id] = p; used.add(match.id); }
  });
  await db.ref(`rooms/${roomCode}/squads/${myId}`).set({ formation:newFmt, slots:newSlots });
}

// ===== SIDE PANEL =====
function updateSidePanel() {
  const locked = Object.keys(roomData.lockedNations||{});
  $id('locked-list').innerHTML = locked.length
    ? locked.map(n=>`<span class="nation-chip">🚫 ${n}</span>`).join('')
    : '<span style="color:var(--muted);font-size:0.78rem">None yet</span>';
  const log = Object.values(roomData.picksLog||{}).sort((a,b)=>b.at-a.at).slice(0,15);
  $id('picks-feed').innerHTML = log.length
    ? log.map(l=>`<div class="pick-item"><div class="pk-name">${l.player}</div><div class="pk-meta">${l.pickerName} · ${l.pos} · ${l.nationality}</div></div>`).join('')
    : '<span style="color:var(--muted);font-size:0.78rem">No picks yet</span>';
}

function togglePanel() {
  panelOpen = !panelOpen;
  $id('side-panel').classList.toggle('mob-open', panelOpen);
}

// ===== RESULTS =====
function renderResults() {
  const players = sortedPlayers();
  if (!viewId || !roomData.players[viewId]) viewId = players[0]?.[0];
  $id('result-tabs').innerHTML = players.map(([id,p])=>`
    <button class="s-tab${id===viewId?' active':''}" onclick="switchResult('${id}',this)">${p.name}</button>`).join('');
  showResultPitch(viewId);
}

function switchResult(pid, btn) {
  viewId = pid;
  document.querySelectorAll('#result-tabs .s-tab').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  showResultPitch(pid);
}

function showResultPitch(pid) {
  const sq = (roomData.squads||{})[pid] || { formation:'4-3-3', slots:{} };
  const defs = FORMATIONS[sq.formation||'4-3-3'];
  $id('result-pitch').innerHTML = `<div style="text-align:center;color:var(--muted);font-size:0.8rem;margin-bottom:6px">${sq.formation||'4-3-3'}</div>`
    + makePitchSVG(defs, sq.slots||{}, false);
}

function goHome() {
  if (roomRef) { roomRef.off(); roomRef=null; }
  roomData=null; viewId=null; myId=null; myName=null; roomCode=null; isHost=false; moveSourceSlot=null;
  showScreen('home-screen');
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.key==='Escape') {
    if (moveSourceSlot) { moveSourceSlot = null; if (viewId) renderPitch(viewId); }
    else closeModal();
  }
});

// ===== INIT =====
window.addEventListener('load', () => showScreen('home-screen'));
</script>
